<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immo Pour Vous | Prestige & Excellence au Maroc</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #042f2e; /* Vert Émeraude */
            --accent: #d4af37;  /* Or */
            --light: #fdfbf7;   /* Sable */
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--light); 
            color: #1a1a1a; 
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 50px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: var(--primary); border-bottom: 2px solid var(--accent);
        }
        .logo { 
            font-family: 'Playfair Display', serif; 
            color: white; font-size: 1.6rem; font-weight: 900; 
            text-decoration: none; letter-spacing: 1px;
        }
        .logo span { color: var(--accent); }

        .nav-contact { color: var(--accent); font-weight: 700; text-decoration: none; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 5px; }

        /* --- HERO --- */
        header {
            background: linear-gradient(rgba(4, 47, 46, 0.7), rgba(4, 47, 46, 0.7)), 
                        url('https://images.unsplash.com/photo-1539667468225-bda0c11af318?auto=format&fit=crop&w=1500') center/cover;
            height: 45vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 4rem); text-transform: uppercase; letter-spacing: 3px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }

        /* --- SECTION ASMAA LAHLOU (DIRECTRICE) --- */
        .agent-section {
            background: var(--white);
            margin-top: -60px; /* Chevauche le Hero pour le style */
            padding: 40px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
            border-bottom: 4px solid var(--accent);
        }
        .agent-photo {
            width: 200px; height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--light);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .agent-info h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--primary); margin-bottom: 5px; }
        .agent-title { color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; display: block; margin-bottom: 15px; }
        .agent-quote { 
            font-family: 'Playfair Display', serif;
            font-style: italic; font-size: 1.4rem; color: #333; 
            line-height: 1.5; border-left: 4px solid var(--accent); padding-left: 20px;
        }

        /* --- TITRE DE LA GRILLE --- */
        .section-title {
            text-align: center; font-family: 'Playfair Display', serif;
            font-size: 2.5rem; color: var(--primary); margin: 60px 0 40px;
        }

        /* --- GRILLE : 3 PHOTOS PAR LIGNE --- */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* FORCE LES 3 COLONNES */
            gap: 30px;
        }

        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s;
            border: 1px solid #eee;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        
        .card-body { padding: 25px; text-align: center; }
        .card-body h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; }
        .price { color: var(--accent); font-weight: 800; font-size: 1.2rem; }

        /* --- FORMULAIRE --- */
        .contact-box { 
            background: var(--primary); padding: 50px; border-radius: 20px; 
            color: white; text-align: center; margin-top: 60px;
        }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; font-size: 1rem; }
        .btn { background: var(--accent); color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 1.1rem; }

        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D36
