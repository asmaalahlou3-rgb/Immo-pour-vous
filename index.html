<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immo Pour Vous | Grille de Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #042f2e; 
            --accent: #d4af37;  
            --light: #fdfbf7;   
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); scroll-behavior: smooth; }

        /* NAV */
        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 50px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: var(--primary); border-bottom: 2px solid var(--accent);
        }
        .logo { font-family: 'Playfair Display', serif; color: white; font-size: 1.4rem; font-weight: 900; text-decoration: none; }
        .logo span { color: var(--accent); }

        /* HERO */
        header {
            background: linear-gradient(rgba(4, 47, 46, 0.7), rgba(4, 47, 46, 0.7)), 
                        url('https://images.unsplash.com/photo-1539667468225-bda0c11af318?auto=format&fit=crop&w=1500') center/cover;
            height: 50vh; display: flex; align-items: center; justify-content: center; color: white;
        }
        header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; text-transform: uppercase; letter-spacing: 3px; }

        /* --- LA GRILLE DE 3 PHOTOS PAR LIGNE --- */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* FORCE 3 COLONNES */
            gap: 25px; /* Espace entre les photos */
        }

        .card { 
            background: white; border-radius: 10px; overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s;
            border: 1px solid #eee;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 20px; text-align: center; }
        .card-body h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--primary); }
        .price { color: var(--accent); font-weight: 800; display: block; margin-bottom: 5px; }

        /* FORMULAIRE */
        .contact-box { 
            background: var(--primary); padding: 40px; border-radius: 15px; 
            color: white; text-align: center; margin-top: 50px;
        }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; }
        .btn { background: var(--accent); color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* MOBILE */
        @media (max-width: 900px) {
            .properties-grid { grid-template-columns: 1fr; } /* 1 seule colonne sur téléphone */
            nav { padding: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">IMMO <span>POUR VOUS</span></a>
        <div style="color: white; font-weight: 600;">+212 615 602 263</div>
    </nav>

    <header>
        <h1>Nos Biens d'Exception</h1>
    </header>

    <div class="container">
        <div class="properties-grid">
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=600" alt="Villa">
                <div class="card-body">
                    <span class="price">12.500.000 MAD</span>
                    <h3>Villa Palmeraie</h3>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600" alt="Villa">
                <div class="card-body">
                    <span class="price">10.900.000 MAD</span>
                    <h3>Modern Agadir</h3>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1541976844346-f18aeac57b06?auto=format&fit=crop&w=600" alt="Riad">
                <div class="card-body">
                    <span class="price">7.500.000 MAD</span>
                    <h3>Riad Historique</h3>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=600" alt="Penthouse">
                <div class="card-body">
                    <span class="price">9.200.000 MAD</span>
                    <h3>Penthouse Tanger</h3>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600" alt="Villa">
                <div class="card-body">
                    <span class="price">18.000.000 MAD</span>
                    <h3>Anfa Prestige</h3>
                </div>
            </div>

            <div class="card">
                <img src="https://images.pexels.com/photos/1125137/pexels-photo-1125137.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Riad">
                <div class="card-body">
                    <span class="price">6.800.000 MAD</span>
                    <h3>Riad Médina</h3>
                </div>
            </div>

        </div>

        <div class="contact-box" id="contact">
            <h2>Contactez Asmaa Lahlou</h2>
            <form>
                <input type="text" placeholder="Nom Complet">
                <input type="email" placeholder="Email">
                <textarea rows="4" placeholder="Votre message"></textarea>
                <button type="submit" class="btn">Envoyer la demande</button>
            </form>
        </div>
    </div>

    <footer style="text-align: center; padding: 30px; background: #011111; color: white;">
        © 2026 Immo Pour Vous
    </footer>

</body>
</html>
